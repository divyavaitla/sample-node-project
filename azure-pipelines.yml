trigger:
- master

pool:
  name: Default

variables:
  - name: buildName
    value: node-npm-app
  - name: buildNumber
    value: $(Build.BuildNumber)

steps:

# Install Node
- task: NodeTool@0
  inputs:
    versionSpec: '20.x'
  displayName: Install Node.js

# Install dependencies
- script: |
    npm ci
  displayName: Install Dependencies

# Run tests
- script: |
    npm test
  displayName: Run Tests

# Install JFrog CLI
- script: |
    curl -fL https://install-cli.jfrog.io | sh
    sudo mv jfrog /usr/local/bin/jfrog
  displayName: Install JFrog CLI

# Configure JFrog CLI
- script: |
    jf c add artifactory-server \
      --url=$(JF_URL) \
      --access-token=$(JF_ACCESS_TOKEN) \
      --interactive=false
  displayName: Configure JFrog CLI

# Configure npm with Artifactory
- script: |
    jf npm-config \
      --repo-resolve=$(NPM_REPO) \
      --repo-deploy=$(NPM_REPO)
  displayName: Configure npm for Artifactory

# Publish package
- script: |
    jf npm publish \
      --build-name=$(buildName) \
      --build-number=$(buildNumber)
  displayName: Publish Package to Artifactory

# Publish build info to Artifactory
- script: |
    jf rt build-publish $(buildName) $(buildNumber)
  displayName: Publish Build Info